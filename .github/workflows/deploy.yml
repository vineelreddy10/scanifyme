name: Deploy ScanifyMe to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests (not recommended)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  DEPLOY_DIR: /opt/scanifyme

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate workflow inputs
        run: |
          echo "Deploying to VPS..."
          echo "Skip tests: ${{ github.event.inputs.skip_tests || 'false' }}"
      
      - name: Setup SSH key
        run: |
          echo "=== Debug: Checking secrets ==="
          echo "VPS_HOST set: ${VPS_HOST:+yes}"
          echo "VPS_USER set: ${VPS_USER:+yes}"
          echo "VPS_SSH_KEY set: ${VPS_SSH_KEY:+yes}"
          
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "ERROR: VPS_SSH_KEY secret is empty or not set!"
            exit 1
          fi
          
          if [ -z "$VPS_HOST" ]; then
            echo "ERROR: VPS_HOST secret is empty or not set!"
            exit 1
          fi
          
          if [ -z "$VPS_USER" ]; then
            echo "ERROR: VPS_USER secret is empty or not set!"
            exit 1
          fi
          
          echo "Creating SSH directory..."
          mkdir -p ~/.ssh
          
          echo "Writing SSH key..."
          # Use printf to avoid any echo issues with special characters
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Verify key was written
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "ERROR: SSH key file is empty!"
            exit 1
          fi
          
          echo "Adding host key..."
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "SSH key setup complete"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Wait for VPS to be ready
        run: |
          echo "Checking if VPS is reachable..."
          echo "Host: $VPS_HOST"
          
          # Wait up to 5 minutes for port 22 to become available
          for i in {1..60}; do
            if timeout 2 bash -c "echo > /dev/tcp/$VPS_HOST/22" 2>/dev/null; then
              echo "Port 22 is now open!"
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Waiting... ($i/60 attempts)"
            fi
            sleep 5
          done
          
          # Final check
          if ! timeout 2 bash -c "echo > /dev/tcp/$VPS_HOST/22" 2>/dev/null; then
            echo "ERROR: VPS port 22 not reachable after 5 minutes"
            echo "The VPS may be:"
            echo "  - Stopped or shut down"
            echo "  - Firewalled"
            echo "  - Experiencing issues"
            echo ""
            echo "Please check:"
            echo "  1. Is the VPS running?"
            echo "  2. Is SSH service enabled?"
            echo "  3. Is port 22 open in firewall?"
            exit 1
          fi
          
          echo "VPS is reachable on port 22"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Verify VPS connectivity
        run: |
          echo "Attempting SSH connection..."
          
          # Multiple retry attempts with backoff
          for attempt in 1 2 3 4 5; do
            echo "SSH attempt $attempt/5..."
            
            # Try SSH with different options
            if ssh -o ConnectTimeout=30 \
               -o StrictHostKeyChecking=no \
               -o UserKnownHostsFile=/dev/null \
               -o ServerAliveInterval=10 \
               -o ServerAliveCountMax=3 \
               -o PreferredAuthentications=publickey \
               -i ~/.ssh/deploy_key \
               "$VPS_USER@$VPS_HOST" \
               "echo 'SSH OK' && uname -a" 2>&1; then
              echo "SSH connection successful!"
              exit 0
            fi
            
            echo "Attempt $attempt failed"
            
            # Wait before retry (longer each time)
            case $attempt in
              1) sleep 10 ;;
              2) sleep 20 ;;
              3) sleep 30 ;;
              4) sleep 40 ;;
            esac
          done
          
          echo "ERROR: All 5 SSH attempts failed"
          echo "=== Debug ==="
          ls -la ~/.ssh/deploy_key
          head -2 ~/.ssh/deploy_key
          exit 1
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Check VPS resources
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo '=== Disk Space ==='
            df -h /
            echo '=== Docker Status ==='
            docker ps
            echo '=== Memory ==='
            free -h
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Run preflight checks on VPS
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            cd $DEPLOY_DIR
            # Check minimum disk space (10GB)
            available=\$(df -BG / | tail -1 | awk '{print \$4}' | sed 's/G//')
            if [ \"\$available\" -lt 10 ]; then
              echo 'ERROR: Insufficient disk space. Available: '\${available}'GB, Required: 10GB'
              exit 1
            fi
            echo 'Disk space OK: '\${available}'GB available'
            
            # Check Docker is running
            if ! docker info > /dev/null 2>&1; then
              echo 'ERROR: Docker daemon is not running'
              exit 1
            fi
            echo 'Docker is running'
            
            # Check required files
            if [ ! -f compose.prod.yaml ]; then
              echo 'ERROR: compose.prod.yaml not found'
              exit 1
            fi
            echo 'Required files present'
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_DIR: /opt/scanifyme
      
      - name: Clean Docker resources (low-resource VPS)
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo 'Cleaning Docker resources...'
            docker image prune -f
            docker container prune -f
            docker network prune -f
            docker builder prune -a -f
            echo 'Cleanup complete'
            df -h /
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Build and deploy application
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            cd $DEPLOY_DIR
            
            # Download original Containerfile and patch it to include Python deps
            echo '=== Patching Containerfile to include Python dependencies ==='
            cp images/custom/Containerfile /tmp/Containerfile.orig
            
            # Find the line number where 'FROM base AS backend' appears and insert pip install before it
            # Insert after the builder stage ends
            awk '
              /FROM base AS backend/ && !inserted {
                print \"# Install ScanifyMe Python dependencies\"
                print \"RUN /home/frappe/frappe-bench/env/bin/pip install qrcode[pil] redis\"
                print \"\"
                inserted=1
              }
              { print }
            ' /tmp/Containerfile.orig > /tmp/Containerfile.with-deps
            
            echo '=== Containerfile patched ==='
            grep -n 'qrcode' /tmp/Containerfile.with-deps || echo 'Patch applied'
            
            echo '=== Building Docker image with dependencies ==='
            docker build \
              --build-arg=FRAPPE_PATH=https://github.com/frappe/frappe \
              --build-arg=FRAPPE_BRANCH=version-16 \
              --build-arg=APPS_JSON_BASE64=\$(base64 -w 0 apps.json) \
              --tag=scanifyme:v16 \
              --file=/tmp/Containerfile.with-deps . \
              --load
            
            echo '=== Restarting services ==='
            docker compose --env-file .env -f compose.prod.yaml up -d
            
            echo 'Waiting for services to start...'
            sleep 15
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_DIR: /opt/scanifyme
      
      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo 'Running migrations...'
            docker exec scanifyme-backend-1 bench --site scanifyme.app migrate
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Build and sync assets
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo 'Building assets...'
            docker exec scanifyme-backend-1 bench --site scanifyme.app build
            
            echo 'Syncing assets to frontend container...'
            docker cp scanifyme-backend-1:/home/frappe/frappe-bench/sites/assets/frappe/dist/css/. /tmp/css_backend/
            docker cp /tmp/css_backend/. scanifyme-frontend-1:/home/frappe/frappe-bench/sites/assets/frappe/dist/css/
            
            docker cp scanifyme-backend-1:/home/frappe/frappe-bench/sites/assets/frappe/dist/js/. /tmp/js_backend/
            docker cp /tmp/js_backend/. scanifyme-frontend-1:/home/frappe/frappe-bench/sites/assets/frappe/dist/js/
            
            echo 'Clearing caches...'
            docker exec scanifyme-backend-1 bench --site scanifyme.app clear-cache
            docker exec scanifyme-backend-1 bench --site scanifyme.app clear-website-cache
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Run smoke tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo '=== Running Smoke Tests ==='
            failed=0
            
            # Test 1: API Ping
            echo 'Test 1: API Ping...'
            if curl -s http://localhost:8080/api/method/ping | grep -q 'pong'; then
              echo '✓ API Ping: PASS'
            else
              echo '✗ API Ping: FAIL'
              failed=1
            fi
            
            # Test 2: Frontend loads
            echo 'Test 2: Frontend loads...'
            if curl -s http://localhost:8080/frontend | grep -q 'doctype html'; then
              echo '✓ Frontend load: PASS'
            else
              echo '✗ Frontend load: FAIL'
              failed=1
            fi
            
            # Test 3: Login works
            echo 'Test 3: Login works...'
            login_response=\$(curl -s -c /tmp/gh_cookies.txt -X POST http://localhost:8080/api/method/login \
              -H 'Content-Type: application/json' \
              -d '{\"usr\":\"Administrator\",\"pwd\":\"admin@123\"}')
            if echo \"\$login_response\" | grep -q 'Logged In'; then
              echo '✓ Login: PASS'
            else
              echo '✗ Login: FAIL'
              failed=1
            fi
            
            # Test 4: QR Batch list API
            echo 'Test 4: QR Batch list API...'
            batch_response=\$(curl -s -b /tmp/gh_cookies.txt -X POST \
              http://localhost:8080/api/method/scanifyme.api.safe_list_api.get_safe_list_rows \
              -H 'Content-Type: application/json' \
              -d '{\"doctype\":\"QR Batch\"}')
            if echo \"\$batch_response\" | grep -q 'rows'; then
              echo '✓ QR Batch list: PASS'
            else
              echo '✗ QR Batch list: FAIL'
              failed=1
            fi
            
            # Test 5: Filtered QR Code Tag list
            echo 'Test 5: Filtered QR Code Tag list...'
            tags_response=\$(curl -s -b /tmp/gh_cookies.txt -X POST \
              http://localhost:8080/api/method/scanifyme.api.safe_list_api.get_safe_list_rows \
              -H 'Content-Type: application/json' \
              -d '{\"doctype\":\"QR Code Tag\",\"filters\":{\"batch\":\"QRB-2026-00001\"}}')
            if echo \"\$tags_response\" | grep -q 'rows'; then
              echo '✓ Filtered QR list: PASS'
            else
              echo '✗ Filtered QR list: FAIL'
              failed=1
            fi
            
            # Test 6: Container health
            echo 'Test 6: Container health...'
            unhealthy=\$(docker ps --filter 'health=unhealthy' -q | wc -l)
            if [ \"\$unhealthy\" -eq 0 ]; then
              echo '✓ Container health: PASS'
            else
              echo '✗ Container health: FAIL'
              failed=1
            fi
            
            rm -f /tmp/gh_cookies.txt
            
            if [ \$failed -eq 1 ]; then
              echo 'SOME TESTS FAILED'
              exit 1
            fi
            echo 'ALL TESTS PASSED'
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Post-deploy cleanup
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "
            echo 'Post-deploy cleanup...'
            docker builder prune -f
            docker image prune -f
            echo 'Disk after deploy:'
            df -h /
          "
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "VPS: $VPS_HOST"
          echo "Site: http://$VPS_HOST:8080/frontend"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Deployment failure - provide rollback guidance
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "=== ROLLBACK GUIDANCE ==="
          echo "1. SSH into VPS: ssh $VPS_USER@$VPS_HOST"
          echo "2. Check logs: docker logs scanifyme-backend-1 --tail 100"
          echo "3. Restart services: cd /opt/scanifyme && docker compose --env-file .env -f compose.prod.yaml restart"
          echo "4. If needed, rebuild from previous commit"
          echo ""
          echo "See SYSTEM_STATE.md for detailed rollback procedures"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
