name: Deploy ScanifyMe to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests (not recommended)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DEPLOY_DIR: /opt/scanifyme

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      
      - name: Verify VPS connectivity
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'echo SSH connection successful'
      
      - name: Run deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd ${{ env.DEPLOY_DIR }} && bash deploy/deploy.sh'
      
      - name: Deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "VPS: ${{ secrets.VPS_HOST }}"
          echo "Site: http://${{ secrets.VPS_HOST }}:8080/frontend"
      
      - name: Deployment failure - provide rollback guidance
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "=== ROLLBACK GUIDANCE ==="
          echo "1. SSH into VPS: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          echo "2. Check logs: docker logs scanifyme-backend-1 --tail 100"
          echo "3. Restart services: cd /opt/scanifyme && docker compose --env-file .env -f compose.prod.yaml restart"
          echo "4. If needed, rebuild from previous commit"
          echo ""
          echo "See SYSTEM_STATE.md for detailed rollback procedures"
